name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Building ${{ matrix.target }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            dependencies: "curl wget git libssl-dev libasound2-dev libdbus-1-dev libxcb-shape0-dev libxcb-xfixes0-dev"
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.dependencies
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.dependencies }}
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          override: true
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          case ${{ matrix.target }} in
          *-pc-windows-*)
            7z -y a rust-browser-${{ matrix.target }}.zip rust-browser.exe
            sha256sum rust-browser-${{ matrix.target }}.zip > rust-browser-${{ matrix.target }}.sha256
            ;;
          *)
            tar czvf rust-browser-${{ matrix.target }}.tar.gz rust-browser
            shasum -a 256 rust-browser-${{ matrix.target }}.tar.gz > rust-browser-${{ matrix.target }}.sha256
            ;;
          esac;

      - name: Release 
        uses: softprops/action-gh-release@v2
        with:
          files: target/${{ matrix.target }}/release/rust-browser-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      


